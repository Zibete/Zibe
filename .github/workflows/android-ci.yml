name: Android CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🏗️ Checkout
        uses: actions/checkout@v4

      - name: ✅ Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: 🔧 Create local.properties (CI dummy)
        shell: bash
        run: |
          cat > local.properties <<'EOF'
          WEB_CLIENT_ID=CHANGE_ME
          FACEBOOK_APP_ID=123456789012345
          FACEBOOK_CLIENT_TOKEN=00000000000000000000000000000000
          EOF

      - name: ☕ Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: 🔑 Create google-services.json (CI dummy)
        shell: bash
        run: |
          mkdir -p app
          cp app/google-services.example.json app/google-services.json

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: ℹ️ Gradle Info
        run: ./gradlew -version

      - name: 🧰 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: 📦 Install rules test deps
        run: npm ci

      - name: 🧪 Firebase RTDB rules tests (emulator)
        run: npm run test:rules

      - name: ✅ Unit tests (JVM)
        run: ./gradlew testDebugUnitTest

      - name: 🧼 Android Lint
        run: ./gradlew lintDebug

      - name: 🔨 Assemble Debug
        run: ./gradlew :app:assembleDebug

      - name: 🛡️ Compile release (source set check)
        run: ./gradlew :app:compileReleaseKotlin

      - name: 📦 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore

      - name: 📦 Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*
            app/build/reports/lint-results-*/**
          if-no-files-found: ignore

      - name: 📊 Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Android CI"
            echo ""
            echo "**Comandos (local):**"
            echo "\`npm ci && npm run test:rules && ./gradlew testDebugUnitTest lintDebug :app:assembleDebug :app:compileReleaseKotlin\`"
            echo ""
            echo "**Artifacts:** unit-test-reports / lint-reports"
          } >> "$GITHUB_STEP_SUMMARY"
