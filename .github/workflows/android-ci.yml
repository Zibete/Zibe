name: Android CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore google-services.json
        shell: bash
        run: |
          mkdir -p app
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Gradle Info
        run: ./gradlew -version

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install rules test deps
        run: npm ci

      - name: Firebase RTDB rules tests (emulator)
        run: npm run test:rules

      # 1) Unit tests (JVM)
      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      # 2) Android Lint
      - name: Android Lint
        run: ./gradlew lintDebug

      # 3) Build debug
      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug

      # 4) Release compile check (sin signing)
      - name: Compile release (source set check)
        run: ./gradlew :app:compileReleaseKotlin

      # Upload reports (always, even if failing)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-*
            app/build/reports/lint-results-*/**
          if-no-files-found: ignore
